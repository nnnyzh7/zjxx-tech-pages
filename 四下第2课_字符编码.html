<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>字符编码实验室 - Decker Style</title>
    <style>
        body { background-color: #e0e0e0; color: #000; font-family: 'Courier New', monospace; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .pixel-card { border: 4px solid #000; background: #fff; box-shadow: 10px 10px 0px #000; padding: 20px; margin-bottom: 30px; width: 90%; max-width: 900px; }
        h1, h2 { background: #000; color: #fff; padding: 5px 10px; display: inline-block; margin-top: 0; }
        .tool-box { background: #f9f9f9; border: 2px dashed #000; padding: 15px; margin: 10px 0; }
        
        /* 比特小人控制区 */
        .bit-stage { background: #fff; border: 2px solid #000; padding: 20px; position: relative; }
        .monitor { background: #333; color: #0f0; padding: 10px; font-family: 'Courier New'; text-align: center; margin-bottom: 20px; border: 4px inset #666; }
        .bit-row { display: flex; justify-content: center; gap: 10px; }
        .bit-man { text-align: center; cursor: pointer; width: 80px; }
        .man-img { font-size: 45px; transition: 0.2s; }
        .man-img.active { transform: translateY(-10px) scale(1.1); filter: drop-shadow(0 0 5px #f00); }
        
        /* 0/1 数字显示 - 加大加粗 */
        .bit-code { 
            display: block; 
            font-size: 36px; 
            font-weight: 900; 
            background: #ffff00; 
            border: 2px solid #000; 
            margin: 5px 0;
            line-height: 1.2;
        }
        .weight-tip { font-size: 12px; color: #666; border-top: 1px solid #ccc; margin-top: 5px; display: block; }
        
        /* 姓名缩写挑战 */
        .name-target { color: #d32f2f; font-size: 24px; font-weight: bold; border-bottom: 2px solid #000; }

        input, textarea { border: 2px solid #000; padding: 8px; font-family: inherit; width: 100%; box-sizing: border-box; }
        .btn { background: #000; color: #fff; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn:hover { background: #444; }
        .match-anim { animation: celebrate 0.5s infinite; }
        @keyframes celebrate { 0% { background: #fff; } 50% { background: #ccffcc; } 100% { background: #fff; } }
    </style>
</head>
<body>

<div class="pixel-card">
    <h1>1. 实验员登录</h1>
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
        <input type="text" id="stuClass" placeholder="班级">
        <input type="text" id="stuID" placeholder="学号">
        <input type="text" id="stuName" placeholder="姓名（拼音/英文）">
    </div>
</div>

<div class="pixel-card">
    <h2>2. 任务一：姓名缩写比特挑战</h2>
    <div class="tool-box">
        <p>💡 <b>操作指南：</b>请依次拼出你姓名中随机挑战字母的编码。点击小人切换 <b>0</b> 和 <b>1</b>。</p>
        <div style="font-size: 20px; font-weight: bold; margin-bottom: 10px;">
            当前挑战字母: <span id="targetLetter" class="name-target">?</span> 
            目标数值: <span id="targetNum" style="color: #00f;">?</span>
        </div>
    </div>

    <div class="bit-stage" id="stage">
        <div class="monitor">
            当前小人组成的数值：<span id="currentNum" style="font-size: 32px;">0</span>
        </div>
        <div class="bit-row">
            <script>
                const weights = [128, 64, 32, 16, 8, 4, 2, 1];
                weights.forEach((w, i) => {
                    document.write(`
                    <div class="bit-man" onclick="toggleBit(${i})">
                        <div id="icon-${i}" class="man-img">🙇</div>
                        <span style="font-weight:bold">${w}分</span>
                        <span id="code-${i}" class="bit-code">0</span>
                        <span class="weight-tip">第${8-i}位</span>
                    </div>`);
                });
            </script>
        </div>
    </div>
    <p id="msg1" style="color:green; font-weight:bold; display:none; text-align:center;">✨ 完美匹配！计算中心已收到该字符信号！</p>
</div>

<div class="pixel-card">
    <h2>3. 任务二：日记破译站 (UTF-8)</h2>
    <div class="tool-box">
        <p>请破译课件中的密文：<code>E4B880E4B8AAE698AFE68CA4E58AB2...</code></p>
        <textarea id="hexInput" placeholder="在此粘贴代码..."></textarea>
        <button class="btn" onclick="decodeHex()">开始翻译</button>
        <div id="decodeResult" style="margin-top:10px; color: #d32f2f; font-weight: bold;">翻译结果：---</div>
    </div>
    
    <div style="background:#eee; padding:15px; border:2px solid #000;">
        <p>第一句答案：<input type="text" id="ans1" placeholder="填入翻译出的第一句话"></p>
        <p>第二句答案：<input type="text" id="ans2" placeholder="填入翻译出的第二句话"></p>
    </div>
</div>

<button class="btn" style="width:100%; max-width:900px; padding:20px; font-size:24px;" onclick="exportFile()">💾 下载实验报告 (.txt)</button>

<script>
    let bits = [0,0,0,0,0,0,0,0];
    let goal = null;
    let nameQueue = [];
    const bitWeights = [128, 64, 32, 16, 8, 4, 2, 1];

    // 监听姓名输入，自动提取首字母作为关卡
    document.getElementById('stuName').addEventListener('input', function(e) {
        const val = e.target.value.toUpperCase();
        nameQueue = val.replace(/[^A-Z]/g, '').split('');
        if(nameQueue.length > 0) {
            updateGoal(nameQueue[0]);
        }
    });

    function updateGoal(letter) {
        goal = letter.charCodeAt(0);
        document.getElementById('targetLetter').innerText = letter;
        document.getElementById('targetNum').innerText = goal;
        check();
    }

    function toggleBit(i) {
        bits[i] = bits[i] === 0 ? 1 : 0;
        document.getElementById(`code-${i}`).innerText = bits[i];
        const icon = document.getElementById(`icon-${i}`);
        icon.innerText = bits[i] === 1 ? "🧍" : "🙇";
        bits[i] === 1 ? icon.classList.add('active') : icon.classList.remove('active');
        updateCurrent();
    }

    function updateCurrent() {
        let sum = 0;
        bits.forEach((bit, i) => { if(bit === 1) sum += bitWeights[i]; });
        document.getElementById('currentNum').innerText = sum;
        check();
    }

    function check() {
        const current = parseInt(document.getElementById('currentNum').innerText);
        const stage = document.getElementById('stage');
        const msg = document.getElementById('msg1');
        if(goal !== null && current === goal) {
            stage.classList.add('match-anim');
            msg.style.display = 'block';
        } else {
            stage.classList.remove('match-anim');
            msg.style.display = 'none';
        }
    }

    function decodeHex() {
        const hex = document.getElementById('hexInput').value.replace(/\s+/g, '');
        try {
            const bytes = new Uint8Array(hex.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
            const decoded = new TextDecoder('utf-8').decode(bytes);
            document.getElementById('decodeResult').innerText = "翻译结果：" + decoded;
        } catch(e) { alert("代码格式不正确哦！"); }
    }

    function exportFile() {
        const info = {
            c: document.getElementById('stuClass').value,
            id: document.getElementById('stuID').value,
            n: document.getElementById('stuName').value,
            a1: document.getElementById('ans1').value,
            a2: document.getElementById('ans2').value
        };
        if(!info.n) return alert("请至少填写姓名！");

        const report = `=== 实验报告 ===\n班级：${info.c}\n学号：${info.id}\n姓名：${info.n}\n任务1状态：${document.getElementById('msg1').style.display==='block'?'已通过':'未完成'}\n任务2-1：${info.a1}\n任务2-2：${info.a2}`;
        const blob = new Blob([report], {type: "text/plain;charset=utf-8"});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `${info.c}-${info.id}-${info.n}.txt`;
        link.click();
    }
</script>
</body>
</html>
