<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>奇偶校验挑战 - 最终完美版</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        :root {
            --mc-bg: #C6C6C6;
            --mc-btn: #E0E0E0;
            --mc-purple: #8132C4;
            --mc-green: #3fb32e;
            --mc-red: #ff2222;
            --mc-gold: #FFD700;
            --mc-text: #404040;
        }

        body {
            background-color: #D6D6D6;
            background-image: radial-gradient(#BCBCBC 2px, transparent 2px);
            background-size: 32px 32px;
            color: var(--mc-text);
            font-family: 'ZCOOL KuaiLe', cursive, "Microsoft YaHei";
            padding: 20px; margin: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        .header-box {
            background: var(--mc-btn);
            border: 4px solid #000;
            padding: 10px 30px;
            box-shadow: 0 6px 0 #555;
            margin-bottom: 20px;
        }

        /* 班级学号移到上方 */
        .user-info-bar {
            background: #555; color: white;
            padding: 12px; border: 3px solid #000;
            margin-bottom: 15px; display: flex; gap: 20px;
            width: 800px; justify-content: center;
            box-sizing: border-box;
        }

        .info-input {
            background: black; border: 2px solid var(--mc-btn);
            color: var(--mc-green); padding: 5px 10px; font-family: inherit;
        }

        /* 规则区域 - 删除了符号，调整了布局 */
        .rule-bar {
            background: #404040;
            color: var(--mc-gold);
            border: 4px solid #000;
            padding: 15px;
            width: 800px;
            margin-bottom: 20px;
            box-shadow: inset 4px 4px 0 #222;
            line-height: 1.8;
            box-sizing: border-box;
        }

        .lab-panel {
            background: #B0B0B0; border: 4px solid #000;
            padding: 15px; box-shadow: inset -4px -4px 0 #888, inset 4px 4px 0 #FFF;
            width: 800px; box-sizing: border-box;
        }

        .list-header {
            display: grid; grid-template-columns: 320px 80px 200px;
            gap: 10px; padding: 0 15px 10px 15px;
            font-size: 0.9rem; color: #333; font-weight: bold;
        }

        .data-row {
            display: grid; grid-template-columns: 320px 80px 200px;
            gap: 10px; align-items: center;
            background: #D8D8D8; border: 2px solid #555;
            margin-bottom: 6px; padding: 5px 15px;
        }

        .binary-seq { font-size: 1.2rem; letter-spacing: 4px; font-family: monospace; font-weight: bold; }

        .check-bit {
            background: var(--mc-purple); color: white;
            text-align: center; font-size: 1.2rem;
            padding: 2px; border: 2px solid #000; width: 40px;
        }

        .mc-btn {
            background: var(--mc-btn); border: 2px solid #000;
            padding: 8px 15px; font-family: inherit; cursor: pointer;
            box-shadow: inset -3px -3px 0 #555, inset 3px 3px 0 #FFF;
        }

        .mc-btn:active { box-shadow: inset 3px 3px 0 #555; transform: translateY(2px); }

        .btn-correct:hover { background: var(--mc-green); color: white; }
        .btn-wrong:hover { background: var(--mc-red); color: white; }

        #result-modal {
            display: none; position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--mc-btn); border: 6px solid #000;
            padding: 40px; text-align: center; z-index: 1000;
            box-shadow: 20px 20px 0 rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="header-box">
        <h1 style="margin:0; font-size:1.5rem;">[ 数据防御鉴定中心 ]</h1>
    </div>

    <div class="user-info-bar">
        <div>班级: <input type="text" id="userClass" class="info-input" placeholder="如：401" size="10"></div>
        <div>学号: <input type="text" id="userNo" class="info-input" placeholder="如：01" size="10"></div>
    </div>

    <div class="rule-bar">
        <span style="font-weight:bold; font-size: 1.1rem; color: white;">>> 鉴定规则说明：</span><br>
        1. 数一数数据位中 “1” 的个数。<br>
        2. 如果“1”的个数是 [ 单数 ] ，校验码应该是 0<br>
        3. 如果“1”的个数是 [ 偶数 ] ，校验码应该是 1
    </div>

    <div class="lab-panel">
        <div class="list-header">
            <span>[ 原始数据位 ]</span>
            <span>[ 校验码 ]</span>
            <span>[ 你的判断 ]</span>
        </div>
        <div id="mainGrid"></div>
    </div>

    <button class="mc-btn" style="margin-top:25px; background:var(--mc-purple); color:white; padding:15px 40px; font-size:1.1rem;" onclick="submitAndDownload()">提交并导出成绩单</button>

    <div id="result-modal">
        <h2 style="margin:0;">鉴定报告已生成</h2>
        <div style="font-size: 3.5rem; color: var(--mc-purple); margin: 20px 0;" id="finalScore">0 / 100</div>
        <p id="rankName" style="font-weight:bold; font-size:1.2rem;"></p>
        <p style="color: #666; font-size: 0.9rem;">成绩单文件已自动下载，请注意查看。</p>
        <button class="mc-btn" onclick="location.reload()">重新挑战</button>
    </div>

    <script>
        const questData = [
            { data: "0 0 1 1 1 1 1 0", check: "0", correct: true },
            { data: "0 0 1 0 0 0 1 0", check: "1", correct: true },
            { data: "0 0 1 1 1 1 1 0", check: "0", correct: true },
            { data: "0 0 0 0 0 0 0 0", check: "1", correct: true },
            { data: "0 1 1 1 0 1 1 1", check: "0", correct: false },
            { data: "0 1 0 0 0 0 0 1", check: "1", correct: true },
            { data: "0 0 0 0 1 0 0 1", check: "0", correct: false },
            { data: "0 1 0 1 0 1 0 1", check: "1", correct: true },
            { data: "0 0 1 0 0 0 1 0", check: "1", correct: true },
            { data: "1 1 0 0 0 0 0 1", check: "0", correct: true }
        ];

        let userChoices = Array(10).fill(null);

        const grid = document.getElementById('mainGrid');
        questData.forEach((item, index) => {
            const row = document.createElement('div');
            row.className = 'data-row';
            row.innerHTML = `
                <div class="binary-seq">${item.data}</div>
                <div class="check-bit">${item.check}</div>
                <div class="btn-group">
                    <button class="mc-btn btn-correct" id="btn-t-${index}" onclick="makeChoice(${index}, true)">正确</button>
                    <button class="mc-btn btn-wrong" id="btn-f-${index}" onclick="makeChoice(${index}, false)">错误</button>
                </div>
            `;
            grid.appendChild(row);
        });

        function makeChoice(idx, choice) {
            userChoices[idx] = choice;
            document.getElementById(`btn-t-${idx}`).style.background = choice === true ? '#3fb32e' : '';
            document.getElementById(`btn-t-${idx}`).style.color = choice === true ? 'white' : '';
            document.getElementById(`btn-f-${idx}`).style.background = choice === false ? '#ff2222' : '';
            document.getElementById(`btn-f-${idx}`).style.color = choice === false ? 'white' : '';
        }

        function submitAndDownload() {
            const uClass = document.getElementById('userClass').value;
            const uNo = document.getElementById('userNo').value;
            if(!uClass || !uNo) { alert("请先填写班级和学号！"); return; }

            let score = 0;
            let report = `数据校验挑战成绩单\n班级：${uClass}\n学号：${uNo}\n----------------\n`;

            questData.forEach((item, i) => {
                const isCorrect = userChoices[i] === item.correct;
                if (isCorrect) score += 10;
                report += `第${i+1}组: [${item.data}] 校验:${item.check} | 你的判断:${userChoices[i]===null?'未做':(userChoices[i]?'正确':'错误')} | 结果:${isCorrect?'√':'×'}\n`;
            });
            report += `----------------\n最终得分：${score}\n评级：${score === 100 ? "专家" : "合格"}`;

            const blob = new Blob([report], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${uClass}${uNo}.txt`;
            a.click();

            document.getElementById('result-modal').style.display = 'block';
            document.getElementById('finalScore').innerText = `${score} 分`;
            document.getElementById('rankName').innerText = score === 100 ? "获得成就：[ 数据防御专家 ]" : "评级：[ 合格检测员 ]";
        }
    </script>
</body>
</html>
