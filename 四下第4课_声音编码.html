<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>数字声音魔法工厂 - Decker Lab</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --border: #000; --bg: #fff; --active: #ff4757; }
        body { background: #eee; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }
        
        .decker-card { 
            background: var(--bg); border: 4px solid var(--border); 
            width: 800px; padding: 40px; margin-top: 30px;
            box-shadow: 12px 12px 0px rgba(0,0,0,0.1);
            text-align: center; 
        }

        .title { font-size: 26px; font-weight: 900; border-bottom: 4px solid #000; display: inline-block; margin-bottom: 25px; padding-bottom: 5px; }

        /* 学号输入区 */
        .user-info { margin-bottom: 20px; font-weight: bold; }
        .user-info input { border: 2px solid #000; padding: 8px; text-align: center; font-size: 16px; width: 200px; }

        .lab-screen { background: #000; height: 250px; border: 4px solid #444; position: relative; margin-bottom: 20px; overflow: hidden; }
        canvas { width: 100%; height: 100%; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: #f9f9f9; padding: 20px; border: 2px solid #000; margin-bottom: 30px; }
        .control-item { display: flex; flex-direction: column; align-items: center; }
        input[type=range] { width: 80%; cursor: pointer; accent-color: #000; }

        .formula-box { background: #000; color: #fff; padding: 15px; margin-bottom: 30px; font-size: 15px; line-height: 1.6; }
        .formula-box b { color: #ff4757; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 25px; border: 3px solid #000; }
        th, td { border: 2px solid #000; padding: 12px; text-align: center; }
        th { background: #000; color: #fff; }
        select, input[type="text"] { width: 90%; padding: 8px; border: 1px solid #000; text-align: center; font-family: inherit; }

        .math-challenge { background: #fff4e6; border: 2px solid #000; padding: 20px; margin-top: 10px; font-weight: bold; }
        
        .export-btn { background: #000; color: #fff; padding: 15px 45px; border: none; cursor: pointer; font-weight: bold; font-size: 18px; margin-top: 30px; transition: 0.2s; }
        .export-btn:hover { background: #444; transform: translate(-2px, -2px); box-shadow: 4px 4px 0px #aaa; }
        .audio-btn { background: #28cd41; color: white; border: 2px solid #000; padding: 10px 20px; cursor: pointer; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="decker-card">
        <div class="title">第一站：数字化实验模拟</div>
        <div class="user-info">工号/学号：<input type="text" id="stuID" placeholder="请输入你的学号"></div>
        
        <button class="audio-btn" onclick="toggleAudio()" id="audioBtn">▶ 启动声音流水线</button>

        <div class="lab-screen">
            <canvas id="labCanvas"></canvas>
            <div id="labInfo" style="position:absolute; top:10px; left:10px; color:#0f0; text-align:left; font-size:12px; font-family:monospace;">
                采样频率: -- Hz<br>量化位数: -- bit
            </div>
        </div>

        <div class="controls">
            <div class="control-item">
                <label>📸 采样频率 (切片速度)</label>
                <input type="range" id="rateSlider" min="10" max="100" value="60">
            </div>
            <div class="control-item">
                <label>📏 量化位数 (打分台阶)</label>
                <input type="range" id="bitSlider" min="4" max="16" value="8" step="2">
            </div>
        </div>
    </div>

    <div class="decker-card">
        <div class="title">第二站：生产质检手册</div>
        
        <div class="formula-box">
            [ 魔法换算秘籍 ]<br>
            1个最小积木 = <b>1 bit</b> [cite: 91]<br>
            8个小积木 = <b>1 B</b> (字节) -> (1B = 8bit) [cite: 91]<br>
            1024个大积木 = <b>1 KB</b> -> (1KB = 1024B)
        </div>

        <form id="factoryForm">
            <table>
                <tr>
                    <th>音频格式</th>
                    <th>压缩类型</th>
                    <th>优缺点</th>
                </tr>
                <tr>
                    <td><b>WAVE</b></td>
                    <td><select name="w_type"><option value="">请选择</option><option value="未压缩">未压缩</option><option value="压缩">压缩</option></select></td>
                    <td><input type="text" name="w_eval"></td>
                </tr>
                <tr>
                    <td><b>MP3</b></td>
                    <td><select name="m_type"><option value="">请选择</option><option value="未压缩">未压缩</option><option value="有损压缩">有损压缩</option></select></td>
                    <td><input type="text" name="m_eval"></td>
                </tr>
                <tr>
                    <td><b>WMA</b></td>
                    <td><select name="wm_type"><option value="">请选择</option><option value="未压缩">未压缩</option><option value="有损压缩">有损压缩</option></select></td>
                    <td><input type="text" name="wm_eval"></td>
                </tr>
            </table>

            <div class="math-challenge">
                🧪 质检员挑战：16 bit 等于多少个 B？<br><br>
                答案：<input type="number" id="mathAns" style="width:60px; border:none; border-bottom:2px solid #000; text-align:center; font-size:18px;"> B
            </div>

            <button type="button" class="export-btn" onclick="submitTask()">💾 导出质检报告</button>
        </form>
    </div>

<script>
    const canvas = document.getElementById('labCanvas');
    const ctx = canvas.getContext('2d');
    let offset = 0, audioCtx, scriptNode, isPlaying = false;

    function toggleAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            setupAudio();
        }
        isPlaying ? audioCtx.suspend() : audioCtx.resume();
        isPlaying = !isPlaying;
        document.getElementById('audioBtn').innerText = isPlaying ? "⏹ 停止流水线" : "▶ 启动声音流水线";
    }

    function setupAudio() {
        const freqs = [261.6, 329.6, 392.0]; // 钢琴C和弦
        const merger = audioCtx.createGain(); merger.gain.value = 0.1;
        freqs.forEach(f => {
            const osc = audioCtx.createOscillator(); osc.frequency.value = f;
            osc.connect(merger); osc.start();
        });
        scriptNode = audioCtx.createScriptProcessor(4096, 1, 1);
        scriptNode.onaudioprocess = (e) => {
            let inD = e.inputBuffer.getChannelData(0), outD = e.outputBuffer.getChannelData(0);
            let rate = parseInt(document.getElementById('rateSlider').value);
            let bit = parseInt(document.getElementById('bitSlider').value);
            let step = Math.floor(110 - rate), lv = Math.pow(2, bit) / 2;
            for (let i = 0; i < inD.length; i++) {
                if (i % step === 0) outD[i] = Math.round(inD[i] * lv) / lv;
                else outD[i] = outD[i-1];
            }
        };
        merger.connect(scriptNode); scriptNode.connect(audioCtx.destination);
    }

    function draw() {
        requestAnimationFrame(draw);
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        const rate = parseInt(document.getElementById('rateSlider').value);
        const bit = parseInt(document.getElementById('bitSlider').value);
        const stepX = 115 - rate;
        document.getElementById('labInfo').innerHTML = `采样频率: ${rate * 441} Hz<br>量化位数: ${bit} bit`;
        ctx.beginPath(); ctx.strokeStyle = '#0f0'; ctx.lineWidth = 2;
        for(let i=0; i<canvas.width; i+=stepX) {
            let yRaw = Math.sin((i+offset)*0.02)*60 + canvas.height/2;
            let unit = canvas.height / Math.pow(2, bit/2);
            let yQ = Math.round((yRaw - canvas.height/2)/unit)*unit + canvas.height/2;
            ctx.fillStyle = '#ff4757'; ctx.beginPath(); ctx.arc(i, yQ, 3, 0, Math.PI*2); ctx.fill();
            i===0 ? ctx.moveTo(i, yQ) : ctx.lineTo(i, yQ);
        }
        ctx.stroke(); offset += 2;
    }
    draw();

    function submitTask() {
        const stuID = document.getElementById('stuID').value;
        if(!stuID) { alert("❌ 请先输入你的学号！"); return; }
        if(document.getElementById('mathAns').value == "2") {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            alert("🎊 换算正确！质检报告已生成。");
            const f = document.getElementById('factoryForm');
            let res = `学号：${stuID}\n--- 数字声音质检报告 ---\n`;
            res += `WAVE: [${f.w_type.value}] 评价: ${f.w_eval.value}\n`;
            res += `MP3: [${f.m_type.value}] 评价: ${f.m_eval.value}\n`;
            res += `WMA: [${f.wm_type.value}] 评价: ${f.wm_eval.value}\n\n16 bit = 2 B`;
            const blob = new Blob([res], {type: "text/plain;charset=utf-8"});
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `${stuID}_质检报告.txt`;
            link.click();
        } else { alert("❌ 换算错误，再检查一下秘籍吧！"); }
    }
</script>
</body>
</html>
