<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>末位预言实验室 - Minecraft Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        :root {
            --mc-bg: #C6C6C6;      /* 石头灰 */
            --mc-btn: #E0E0E0;     /* 按钮亮灰 */
            --mc-btn-shadow: #555555; /* 按钮阴影 */
            --mc-purple: #8132C4;  /* Realms 紫 */
            --mc-text: #404040;    /* 标准文本深灰 */
            --mc-gold: #FFD700;    /* 金币黄 */
        }

        body {
            background-color: #D6D6D6;
            background-image: radial-gradient(#BCBCBC 2px, transparent 2px);
            background-size: 32px 32px; /* 像素地板块感 */
            color: var(--mc-text);
            font-family: 'ZCOOL KuaiLe', cursive, "Microsoft YaHei";
            padding: 40px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 顶部标题区 - 模仿Minecraft Logo风格 */
        .header-box {
            background: var(--mc-btn);
            border: 4px solid #000;
            padding: 20px 40px;
            box-shadow: 0 8px 0 var(--mc-btn-shadow);
            margin-bottom: 40px;
            text-align: center;
        }

        h1 { margin: 0; font-size: 2.2rem; color: #000; letter-spacing: 4px; }

        /* 输入主区域 - 像MC的菜单界面 */
        .id-panel {
            background: #B0B0B0;
            border: 4px solid #000;
            padding: 30px;
            box-shadow: inset -4px -4px 0 #888, inset 4px 4px 0 #FFF;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .id-row {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
        }

        .digit-group { display: flex; flex-direction: column; align-items: center; }

        .digit-box {
            width: 44px; height: 60px;
            background: #FFF;
            border: 3px solid #000;
            font-size: 1.8rem;
            text-align: center;
            line-height: 60px;
            outline: none;
            font-family: inherit;
        }

        .digit-box.last {
            background: var(--mc-purple);
            color: #FFF;
            border-color: #000;
            font-weight: bold;
        }

        .weight-label {
            font-size: 0.8rem;
            color: #555;
            margin-top: 8px;
            font-weight: bold;
        }

        /* 标志性的MC方块按钮 */
        .mc-btn {
            background: var(--mc-btn);
            border: 3px solid #000;
            padding: 12px 30px;
            font-family: inherit;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: inset -4px -4px 0 var(--mc-btn-shadow), inset 4px 4px 0 #FFF;
            margin-top: 20px;
        }

        .mc-btn:hover { background: #D0D0D0; }
        .mc-btn:active {
            box-shadow: inset 4px 4px 0 var(--mc-btn-shadow);
            transform: translateY(2px);
        }

        .mc-btn.purple {
            background: var(--mc-purple);
            color: white;
            box-shadow: inset -4px -4px 0 #4a1a7a, inset 4px 4px 0 #b384e0;
        }

        /* 解析实验室 - 像打开了一个大箱子 */
        .lab-chest {
            width: 900px;
            margin-top: 50px;
            background: #C6C6C6;
            border: 4px solid #000;
            padding: 0;
            display: none;
        }

        .chest-header {
            background: #555;
            color: white;
            padding: 10px 20px;
            font-size: 1rem;
        }

        .chest-content {
            padding: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .huge-result {
            font-size: 10rem;
            color: var(--mc-purple);
            text-shadow: 4px 4px 0 #000;
            margin: 20px 0;
            text-align: center;
        }

        /* 求余计算器 */
        .calc-block {
            background: #A0A0A0;
            border: 3px solid #000;
            padding: 20px;
            box-shadow: inset 4px 4px 0 #777;
        }

        .calc-input {
            width: 150px;
            background: white;
            border: 3px solid #000;
            font-family: inherit;
            font-size: 1.4rem;
            padding: 10px;
            text-align: center;
        }

        /* 码表对照 */
        .mapping-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .mapping-table td {
            border: 2px solid #555;
            background: #D8D8D8;
            padding: 8px;
            text-align: center;
            font-size: 0.9rem;
        }
        .active-cell {
            background: var(--mc-purple) !important;
            color: white !important;
        }

        .hint { font-size: 0.8rem; color: #444; margin-top: 10px; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="header-box">
        <h1>末位预言实验室</h1>
    </div>

    <div class="id-panel">
        <p style="margin-bottom: 20px;">[ 请输入身份证前 17 位 ]</p>
        <div class="id-row" id="idGrid">
            </div>
        <button class="mc-btn purple" onclick="predict()">点击开始预言</button>
    </div>

    <div id="lab" class="lab-chest">
        <div class="chest-header">正在解析算法核心...</div>
        <div class="chest-content">
            <div style="text-align: center;">
                <p style="color: #000; font-weight: bold;">预言结果：</p>
                <div class="huge-result" id="hugeDigit">?</div>
                
                <div style="text-align: left; margin-top: 20px;">
                    <p style="font-size: 1rem;">1. 求和结果：<span style="color:red; font-size: 1.5rem;" id="sumVal">0</span></p>
                    <table class="mapping-table">
                        <tr style="font-size: 0.6rem; color: #777;"><td>余</td><td>0</td><td>1</td><td>2</td><td>3</td><td>4</td><td>5</td><td>6</td><td>7</td><td>8</td><td>9</td><td>10</td></tr>
                        <tr id="codeRow"><td>码</td><td>1</td><td>0</td><td>X</td><td>9</td><td>8</td><td>7</td><td>6</td><td>5</td><td>4</td><td>3</td><td>2</td></tr>
                    </table>
                </div>
            </div>

            <div class="calc-block">
                <p style="font-weight: bold; color: #FFF; margin-bottom: 15px;">[ 逻辑验证：求余助手 ]</p>
                <div style="margin-bottom: 20px;">
                    <input type="number" id="calcA" class="calc-input" placeholder="求和">
                    <span style="font-size: 1.2rem;"> ÷ 11</span>
                </div>
                <button class="mc-btn" style="width: 100%;" onclick="calcMod()">开始计算余数</button>
                <div id="modRes" style="margin-top: 20px; font-size: 1.8rem; text-align: center; color: #FFF; text-shadow: 2px 2px #000;">
                    ? ... ?
                </div>
                <p class="hint">提示：将左侧红色的“求和结果”填入上方，看看余数是否指向了预言的数字？</p>
            </div>
        </div>
    </div>

    <script>
        const weights = [7, 9, 10, 5, 8, 4, 2, 1, 6, 3, 7, 9, 10, 5, 8, 4, 2];
        const codes = ['1', '0', 'X', '9', '8', '7', '6', '5', '4', '3', '2'];

        const grid = document.getElementById('idGrid');
        for (let i = 0; i < 17; i++) {
            const group = document.createElement('div');
            group.className = 'digit-group';
            const input = document.createElement('input');
            input.className = 'digit-box';
            input.maxLength = 1;
            input.id = 'd' + i;
            input.oninput = function() {
                if (this.value && i < 16) document.getElementById('d' + (i + 1)).focus();
            };
            const label = document.createElement('div');
            label.className = 'weight-label';
            label.innerText = weights[i];
            group.appendChild(input);
            group.appendChild(label);
            grid.appendChild(group);
        }

        const lastGroup = document.createElement('div');
        lastGroup.className = 'digit-group';
        const lastBox = document.createElement('div');
        lastBox.className = 'digit-box last';
        lastBox.innerText = '?';
        lastBox.id = 'lastBox';
        const lastLabel = document.createElement('div');
        lastLabel.className = 'weight-label';
        lastLabel.innerText = '末位';
        lastGroup.appendChild(lastBox);
        lastGroup.appendChild(lastLabel);
        grid.appendChild(lastGroup);

        function predict() {
            let sum = 0;
            for (let i = 0; i < 17; i++) {
                const v = document.getElementById('d' + i).value;
                if (!v) { alert("请先填满前17位数字哦！"); return; }
                sum += parseInt(v) * weights[i];
            }
            const remainder = sum % 11;
            const final = codes[remainder];

            document.getElementById('hugeDigit').innerText = final;
            document.getElementById('lastBox').innerText = final;
            document.getElementById('sumVal').innerText = sum;
            
            const tds = document.getElementById('codeRow').getElementsByTagName('td');
            for(let td of tds) td.classList.remove('active-cell');

            document.getElementById('lab').style.display = 'block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function calcMod() {
            const a = parseInt(document.getElementById('calcA').value);
            if (isNaN(a)) return;
            const yu = a % 11;
            const shang = Math.floor(a / 11);
            document.getElementById('modRes').innerText = `${shang} 余 ${yu}`;
            
            const tds = document.getElementById('codeRow').getElementsByTagName('td');
            for(let td of tds) td.classList.remove('active-cell');
            if(yu < 11) tds[yu + 1].classList.add('active-cell');
        }
    </script>
</body>
</html>
